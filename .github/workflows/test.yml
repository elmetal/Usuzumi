name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6

    - name: Test
      run: |
        xcodebuild test \
          -scheme Eginu \
          -destination "platform=macOS,variant=Mac Catalyst"
